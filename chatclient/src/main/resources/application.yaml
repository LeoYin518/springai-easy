spring:
  application:
    name: chatclient
  ai:
    deepseek:
      api-key: ${DEEP_SEEK_API_KEY}
      chat:
        options:
          model: deepseek-v4-flash
    dashscope:
      api-key: ${DASHSCOPE_ALI_API_KEY}
      chat:
        options:
          model: qwen-plus
    memory:
      redis:
        host: localhost
        port: 6379
        timeout: 5000
        password: 123456
  datasource:
    url: jdbc:mysql://localhost:3306/springai?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    org.springframework.ai.chat.client.advisor: debug